<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow | Smart Todo Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="logo">TaskFlow</div>
      <ul class="nav-links">
        <li>Home</li>
        <li>Features</li>
        <li>App</li>
        <li>Contact</li>
      </ul>
    </nav>

    <!-- Hero -->
    <section class="hero">
      <h1>Organise your work and life</h1>
      <p>TaskFlow helps you stay focused and productive every day.</p>
    </section>

    <!-- Todo App -->
    <main class="app-container">
      <div class="app">
        <h2>Your Tasks</h2>
        <p id="counter"></p>

        <div class="input-box">
          <input id="todoInput" type="text" placeholder="Add a new task" />
          <button id="addBtn">Add</button>
        </div>

        <div class="filters">
          <button data-filter="all" class="active">All</button>
          <button data-filter="active">Active</button>
          <button data-filter="completed">Completed</button>
        </div>

        <ul id="todoList"></ul>

        <button id="clearCompleted" class="danger">Clear Completed</button>
      </div>
    </main>

    <!-- Footer -->
    <footer>
      <p>© 2026 TaskFlow. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
